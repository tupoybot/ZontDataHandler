name: build-apks

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Restore release keystore from GitHub Secrets
        id: release_signing
        env:
          ZONT_RELEASE_KEYSTORE_BASE64: ${{ secrets.ZONT_RELEASE_KEYSTORE_BASE64 }}
          ZONT_RELEASE_STORE_PASSWORD: ${{ secrets.ZONT_RELEASE_STORE_PASSWORD }}
          ZONT_RELEASE_KEY_ALIAS: ${{ secrets.ZONT_RELEASE_KEY_ALIAS }}
          ZONT_RELEASE_KEY_PASSWORD: ${{ secrets.ZONT_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "${ZONT_RELEASE_KEYSTORE_BASE64:-}" ] || [ -z "${ZONT_RELEASE_STORE_PASSWORD:-}" ] || [ -z "${ZONT_RELEASE_KEY_ALIAS:-}" ] || [ -z "${ZONT_RELEASE_KEY_PASSWORD:-}" ]; then
            printf 'Release signing secrets are not fully configured. Continuing with unsigned release outputs.\n'
            printf 'signing_state=unsigned\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYSTORE_DIR="$RUNNER_TEMP/zont-release-signing"
          KEYSTORE_PATH="$KEYSTORE_DIR/zont-release.keystore"

          mkdir -p "$KEYSTORE_DIR"
          printf '%s' "$ZONT_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          {
            printf 'ZONT_RELEASE_STORE_FILE=%s\n' "$KEYSTORE_PATH"
            printf 'ZONT_RELEASE_STORE_PASSWORD=%s\n' "$ZONT_RELEASE_STORE_PASSWORD"
            printf 'ZONT_RELEASE_KEY_ALIAS=%s\n' "$ZONT_RELEASE_KEY_ALIAS"
            printf 'ZONT_RELEASE_KEY_PASSWORD=%s\n' "$ZONT_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

          printf 'signing_state=signed\n' >> "$GITHUB_OUTPUT"

      - name: Build debug and release APKs
        run: ./gradlew :mobile:assembleDebug :mobile:assembleRelease :wear:assembleDebug :wear:assembleRelease

      - name: Detect release APK outputs
        id: release_outputs
        env:
          SIGNING_STATE: ${{ steps.release_signing.outputs.signing_state }}
        run: |
          detect_release_apk() {
            local dir="$1"
            local prefix="$2"
            local apk

            case "${SIGNING_STATE:-unsigned}" in
              signed)
                apk="$dir/${prefix}-release.apk"
                ;;
              unsigned)
                apk="$dir/${prefix}-release-unsigned.apk"
                ;;
              *)
                printf 'Unexpected signing state: %s\n' "${SIGNING_STATE:-}" >&2
                exit 1
                ;;
            esac

            if [ ! -f "$apk" ]; then
              printf 'Expected %s release APK for %s at %s, but it was not found.\n' "${SIGNING_STATE:-unsigned}" "$prefix" "$apk" >&2
              printf 'Available release APKs in %s:\n' "$dir" >&2
              find "$dir" -maxdepth 1 -type f -name "${prefix}-release*.apk" -printf '  %f\n' >&2 || true
              exit 1
            fi

            printf '%s\n' "$apk"
          }

          MOBILE_APK="$(detect_release_apk mobile/build/outputs/apk/release mobile)"
          WEAR_APK="$(detect_release_apk wear/build/outputs/apk/release wear)"

          {
            printf 'signing_state=%s\n' "${SIGNING_STATE:-unsigned}"
            printf 'mobile_path=%s\n' "$MOBILE_APK"
            printf 'mobile_artifact_name=%s-apk\n' "$(basename "${MOBILE_APK%.apk}")"
            printf 'wear_path=%s\n' "$WEAR_APK"
            printf 'wear_artifact_name=%s-apk\n' "$(basename "${WEAR_APK%.apk}")"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release APK signing state
        env:
          SIGNING_STATE: ${{ steps.release_outputs.outputs.signing_state }}
          MOBILE_APK: ${{ steps.release_outputs.outputs.mobile_path }}
          WEAR_APK: ${{ steps.release_outputs.outputs.wear_path }}
        run: |
          APKSIGNER="$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort | tail -n 1)"

          if [ -z "$APKSIGNER" ]; then
            printf 'apksigner was not found in Android build-tools\n' >&2
            exit 1
          fi

          verify_signed_release() {
            local apk="$1"

            printf 'Verifying signed release APK: %s\n' "$apk"
            "$APKSIGNER" verify --verbose --print-certs "$apk"
          }

          verify_unsigned_release() {
            local apk="$1"

            printf 'Verifying unsigned fallback release APK: %s\n' "$apk"
            if "$APKSIGNER" verify --verbose "$apk" >/dev/null 2>&1; then
              printf 'Expected unsigned release APK when signing inputs are absent, but %s is signed\n' "$apk" >&2
              exit 1
            fi
          }

          if [ "${SIGNING_STATE:-unsigned}" = "signed" ]; then
            verify_signed_release "$MOBILE_APK"
            verify_signed_release "$WEAR_APK"
          else
            verify_unsigned_release "$MOBILE_APK"
            verify_unsigned_release "$WEAR_APK"
          fi

      - name: Summarize release APK state
        run: |
          {
            printf '### Release APK signing\n\n'
            printf -- '- Release signing state: `%s`\n' "${{ steps.release_outputs.outputs.signing_state }}"
            printf -- '- Mobile release artifact: `%s`\n' "${{ steps.release_outputs.outputs.mobile_artifact_name }}"
            printf -- '- Wear release artifact: `%s`\n' "${{ steps.release_outputs.outputs.wear_artifact_name }}"
            printf -- '- Secrets expected for signed builds: `ZONT_RELEASE_KEYSTORE_BASE64`, `ZONT_RELEASE_STORE_PASSWORD`, `ZONT_RELEASE_KEY_ALIAS`, `ZONT_RELEASE_KEY_PASSWORD`\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mobile debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: mobile/build/outputs/apk/debug/mobile-debug.apk
          if-no-files-found: error

      - name: Upload wear debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-debug-apk
          path: wear/build/outputs/apk/debug/wear-debug.apk
          if-no-files-found: error

      - name: Upload mobile release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_outputs.outputs.mobile_artifact_name }}
          path: ${{ steps.release_outputs.outputs.mobile_path }}
          if-no-files-found: error

      - name: Upload wear release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_outputs.outputs.wear_artifact_name }}
          path: ${{ steps.release_outputs.outputs.wear_path }}
          if-no-files-found: error

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([[:space:]]|$)" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.txt

          if [ ! -s release-notes.txt ]; then
            printf 'APK build for %s\n' "$TAG" > release-notes.txt
          fi

      - name: Cleanup legacy releases before 0.1 republish
        if: startsWith(github.ref, 'refs/tags/') && github.ref_name == '0.1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for release in 0.1 0.1.1 0.2; do
            if gh release view "$release" >/dev/null 2>&1; then
              gh release delete "$release" --yes
            fi
          done

      - name: Publish GitHub release with APK assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          APKS=(
            mobile/build/outputs/apk/debug/mobile-debug.apk
            wear/build/outputs/apk/debug/wear-debug.apk
            "${{ steps.release_outputs.outputs.mobile_path }}"
            "${{ steps.release_outputs.outputs.wear_path }}"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${APKS[@]}" --clobber
          else
            gh release create "$TAG" "${APKS[@]}" \
              --title "$TAG" \
              --notes-file release-notes.txt
          fi
