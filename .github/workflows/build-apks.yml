name: build-apks

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug and release APKs
        run: ./gradlew :mobile:assembleDebug :mobile:assembleRelease :wear:assembleDebug :wear:assembleRelease

      - name: Upload mobile debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: mobile/build/outputs/apk/debug/mobile-debug.apk
          if-no-files-found: error

      - name: Upload wear debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-debug-apk
          path: wear/build/outputs/apk/debug/wear-debug.apk
          if-no-files-found: error

      - name: Upload mobile release APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-apk
          path: mobile/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload wear release APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-release-apk
          path: wear/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([[:space:]]|$)" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.txt

          if [ ! -s release-notes.txt ]; then
            printf 'APK build for %s\n' "$TAG" > release-notes.txt
          fi

      - name: Cleanup legacy releases before 0.1 republish
        if: startsWith(github.ref, 'refs/tags/') && github.ref_name == '0.1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for release in 0.1 0.1.1 0.2; do
            if gh release view "$release" >/dev/null 2>&1; then
              gh release delete "$release" --yes
            fi
          done

      - name: Publish GitHub release with APK assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          APKS=(
            mobile/build/outputs/apk/debug/mobile-debug.apk
            wear/build/outputs/apk/debug/wear-debug.apk
            mobile/build/outputs/apk/release/mobile-release-unsigned.apk
            wear/build/outputs/apk/release/wear-release-unsigned.apk
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${APKS[@]}" --clobber
          else
            gh release create "$TAG" "${APKS[@]}" \
              --title "$TAG" \
              --notes-file release-notes.txt
          fi
